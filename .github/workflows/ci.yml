name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Smoke - offline demo
        run: DATA_PROVIDER=synthetic DB_PATH=data/ci.db DEMO_CYCLES=10 TELEGRAM_ENABLED=false python main.py demo
      - name: Smoke - offline backtest
        run: BACKTEST_BARS=600 TELEGRAM_ENABLED=false python main.py backtest > /dev/null
